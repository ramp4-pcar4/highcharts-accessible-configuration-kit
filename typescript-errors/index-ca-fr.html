<!doctype html>
<html lang="fr" dir="ltr">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Trousse de Configuration Accessible Highcharts</title>

        <link rel="stylesheet" href="https://www.canada.ca/etc/designs/canada/cdts/gcweb/v5_0_2/cdts/cdts-styles.css" />
        <script
            src="https://www.canada.ca/etc/designs/canada/cdts/gcweb/v5_0_2/cdts/compiled/wet-fr.js"
            data-cdts-setup='{"cdnEnv": "prod"}'
        ></script>
      <script type="module" crossorigin src="./assets/main-f9mul9fU.js"></script>
      <link rel="stylesheet" crossorigin href="./assets/main-C8E7vMc6.css">
    </head>

    <body>
        <div id="def-top"></div>

        <div id="wb-cont">
            <div id="app"></div>
        </div>

        <div id="def-footer"></div>

        <script type="text/javascript">
            var defTop = document.getElementById('def-top');
            defTop.outerHTML = wet.builder.top({
                lngLinks: [
                    {
                        lang: 'en',
                        href: 'index-ca-en.html' + (window.location.hash || ''),
                        text: 'English'
                    }
                ]
            });
            setTimeout(() => {
                const langChangeContainer = document.querySelector('#wb-lng');
                if (!langChangeContainer) return;

                const langChange = langChangeContainer.querySelector('a');
                if (!langChange) return;

                langChange.addEventListener('click', (e) => {
                    e.preventDefault();

                    const confirmSwitch = confirm(
                        'Changer de langue rechargera la page. Toutes les données que vous avez saisies seront perdues. Continuer?'
                    );

                    if (confirmSwitch) {
                        window.location.href = 'index-ca-en.html' + (window.location.hash || '');
                    }
                });
            }, 0);
        </script>

        <script>
            var defFooter = document.getElementById('def-footer');
            defFooter.outerHTML = wet.builder.footer({});
        </script>

        <script>
            document.write(wet.builder.refFooter({}));
        </script>

        <style>
            html {
                font-size: 16px;
            }
            .container {
                max-width: none !important;
                width: 100% !important;
                margin-left: 0 !important;
                margin-right: 0 !important;
                padding-left: 64px !important;
                padding-right: 64px !important;
            }
        </style>
    </body>
</html>
