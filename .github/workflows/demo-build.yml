name: Build demo site and deploy to GitHub Pages

on: push

permissions:
    contents: write
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        name: Build the project
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - uses: actions/checkout@v6
              with:
                  path: hack

            - uses: actions/setup-node@v6
              with:
                  node-version: 24.15.0
                  cache: npm
                  cache-dependency-path: hack/package-lock.json

            - name: Set up Git
              run: |
                  git config --global user.name "GitHub Action"
                  git config --global user.email "action@github.com"

            - name: Create demo-page branch if it does not exist
              run: |
                  cd hack

                  if git ls-remote --exit-code --heads origin demo-page >/dev/null; then
                      echo "Branch 'demo-page' exists on origin."
                  else
                      echo "Branch 'demo-page' does not exist on origin. Creating an orphan branch..."
                      cd ..
                      mkdir -p demo-page
                      cd demo-page
                      git init
                      git checkout --orphan demo-page
                      git commit --allow-empty -m "Create orphan branch"
                      git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
                      git push -u origin demo-page
                      cd ..
                      rm -rf demo-page
                  fi

            - uses: actions/checkout@v6
              with:
                  ref: demo-page
                  path: demo-page
                  fetch-depth: 0

            - name: Remove the old demo and create target folder
              run: |
                  rm -rf demo-page/${{ github.ref_name }}
                  mkdir -p demo-page/${{ github.ref_name }}

            - name: Build the project
              run: |
                  cd hack
                  npm ci
                  npm run build

            - name: Move the built project into the demo-page folder
              run: |
                  TARGET_DIR="demo-page/${{ github.ref_name }}"
                  cp -a hack/dist/. "${TARGET_DIR}/"

            - name: Commit and squash to the demo-page branch
              run: |
                  cd demo-page
                  git add .

                  if git diff --cached --quiet; then
                      echo "No demo changes to commit."
                  else
                      git commit -m "Apply demo build changes"
                      git reset --soft $(git rev-list --max-parents=0 HEAD)
                      git commit -m "Apply demo build changes"
                      git push origin HEAD:demo-page --force
                  fi

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: demo-page
                  retention-days: 1

            - name: Setup Pages
              uses: actions/configure-pages@v6
              with:
                  enablement: true

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
